name: Flutter APK Build (Stable Ultimate Fix)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java环境（🔥关键，否则Android必炸）
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 4. 显示版本
      - run: flutter --version

      # 5. 进入 Flutter 项目（自动判断）
      - name: Detect Flutter project path
        run: |
          if [ -f pubspec.yaml ]; then
            echo "ROOT=." >> $GITHUB_ENV
          elif [ -f frontend/pubspec.yaml ]; then
            echo "ROOT=frontend" >> $GITHUB_ENV
          else
            echo "ERROR: No Flutter project found"
            exit 1
          fi

      # 6. 安装依赖
      - name: Install dependencies
        run: flutter pub get
        working-directory: ${{ env.ROOT }}

      # 7. 清理
      - name: Clean
        run: flutter clean
        working-directory: ${{ env.ROOT }}

      # 8. 编译APK
      - name: Build APK
        run: flutter build apk --release
        working-directory: ${{ env.ROOT }}

      # 9. 上传APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ${{ env.ROOT }}/build/app/outputs/flutter-apk/app-release.apk
